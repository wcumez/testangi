<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGR | Home</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
        min-height: 100vh;
      }

      header {
        padding: 20px 40px;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(15, 23, 42, 0.85);
        padding: 15px 25px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      }

      .brand {
        font-size: 1.6rem;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .menu {
        display: flex;
        list-style: none;
        gap: 20px;
      }

      .menu a {
        text-decoration: none;
        color: #e2e8f0;
        transition: color 0.2s ease;
      }

      .menu a:hover {
        color: #38bdf8;
      }

      .hero {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        text-align: center;
        padding: 40px 20px;
      }

      .hero-content {
        max-width: 700px;
        background: rgba(255, 255, 255, 0.08);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
      }

      .hero h1 {
        font-size: 3rem;
        margin-bottom: 15px;
      }

      .hero p {
        font-size: 1.1rem;
        line-height: 1.7;
        color: #cbd5e1;
        margin-bottom: 25px;
      }

      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: #38bdf8;
        color: #082f49;
        text-decoration: none;
        border-radius: 999px;
        font-weight: bold;
      }

      .btn:hover {
        background: #0ea5e9;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <div class="brand">MAGR</div>
        <ul class="menu">
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>Welcome to MAGR</h1>
        <p>We build modern, simple, and inspiring digital experiences for the future.</p>
        <a href="#" class="btn">Get Started</a>
      </div>
    </section>
  </body>
</html>
